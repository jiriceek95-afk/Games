<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Streamer Game Library</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:system-ui,Arial;background:#0b1120;color:white}
header{text-align:center;padding:40px 20px 20px}
h1{font-size:46px;margin-bottom:10px}
.subtitle{opacity:.7}
.stats{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;margin-top:25px}
.stat{background:#111827;padding:14px 22px;border-radius:12px;font-size:16px}
.controls{max-width:1100px;margin:30px auto 10px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
input,select{background:#111827;border:none;color:white;padding:10px 12px;border-radius:8px}
.container{max-width:1100px;margin:auto;padding:10px 20px 40px}
.games{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;margin-top:20px}
.card{background:#111827;border-radius:14px;overflow:hidden;transition:transform .2s}
.card:hover{transform:scale(1.05)}
.cover{width:100%;height:280px;object-fit:cover}
.info{padding:14px}
.title{font-weight:700;margin-bottom:6px}
.meta{font-size:14px;opacity:.8}
.rating{margin-top:6px;color:#fbbf24}
.year{opacity:.6;font-size:13px}
.goty{max-width:800px;margin:30px auto;background:#111827;border-radius:16px;padding:20px;text-align:center}
.goty img{height:200px;border-radius:10px;margin-top:10px}
.chartWrap{max-width:900px;margin:40px auto}
footer{text-align:center;margin:40px 0 30px;opacity:.5;font-size:14px}
</style>
</head>

<body>
<header>
<h1>🎮 Moje Streamer Game Library</h1>
<div class="subtitle">Styl Steam – verze A</div>
<div class="stats">
<div class="stat">🏆 Dohráno: <b id="statGames">0</b></div>
<div class="stat">⭐ Průměrné hodnocení: <b id="statRating">0</b></div>
<div class="stat">⏱ Celkem hodin: <b id="statHours">0</b></div>
</div>
</header>

<div class="goty" id="goty"></div>
<div class="chartWrap"><canvas id="yearChart"></canvas></div>

<div class="controls">
<input id="search" placeholder="Hledat hru...">
<select id="yearFilter">
<option value="all">Všechny roky</option>
</select>
</div>

<div class="container">
<div class="games" id="games"></div>
</div>

<footer>Streamer Game List 6.0 – Final Version</footer>

<script>
// Data her – později jen games.json
const gameData=[
{title:"Resident Evil 4 Remake",year:2026,hours:16,rating:9,date:"3.3.2026",cover:"https://images.igdb.com/igdb/image/upload/t_cover_big/co6h3c.jpg"},
{title:"Alan Wake 2",year:2026,hours:20,rating:9,date:"15.2.2026",cover:"https://images.igdb.com/igdb/image/upload/t_cover_big/co5v3q.jpg"},
{title:"Cyberpunk 2077",year:2026,hours:45,rating:8,date:"5.1.2026",cover:"https://images.igdb.com/igdb/image/upload/t_cover_big/co7497.jpg"},
{title:"Baldur's Gate 3",year:2025,hours:60,rating:10,date:"10.10.2025",cover:"https://images.igdb.com/igdb/image/upload/t_cover_big/co2lbd.jpg"},
{title:"The Last of Us",year:2025,hours:18,rating:9,date:"5.6.2025",cover:"https://images.igdb.com/igdb/image/upload/t_cover_big/co1r7f.jpg"}
];

const container=document.getElementById("games"),search=document.getElementById("search"),yearFilter=document.getElementById("yearFilter"),goty=document.getElementById("goty");

function renderGames(list){container.innerHTML="";list.forEach(game=>{const card=document.createElement("div");card.className="card";card.innerHTML=`<img class="cover" src="${game.cover}"><div class="info"><div class="title">${game.title}</div><div class="year">${game.year}</div><div class="meta">⏱ ${game.hours}h • 📅 ${game.date}</div><div class="rating">⭐ ${game.rating}/10</div></div>`;container.appendChild(card);});}

function updateStats(){const total=gameData.length,hours=gameData.reduce((a,b)=>a+b.hours,0),rating=(gameData.reduce((a,b)=>a+b.rating,0)/total).toFixed(1);document.getElementById("statGames").textContent=total;document.getElementById("statHours").textContent=hours+"h";document.getElementById("statRating").textContent=rating;}

function populateYears(){const years=[...new Set(gameData.map(g=>g.year))].sort((a,b)=>b-a);years.forEach(y=>{const opt=document.createElement("option");opt.value=y;opt.textContent=y;yearFilter.appendChild(opt);});}

function applyFilters(){let filtered=[...gameData];const s=search.value.toLowerCase(),y=yearFilter.value;if(s)filtered=filtered.filter(g=>g.title.toLowerCase().includes(s));if(y!="all")filtered=filtered.filter(g=>g.year==y);renderGames(filtered);}

function createChart(){const yearCounts={};gameData.forEach(g=>{yearCounts[g.year]=(yearCounts[g.year]||0)+1;});const labels=Object.keys(yearCounts),data=Object.values(yearCounts);new Chart(document.getElementById("yearChart"),{type:"bar",data:{labels:labels,datasets:[{label:"Dohrané hry",data:data,backgroundColor:'#fbbf24'}]},options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});}

function renderGOTY(){let best=[...gameData].sort((a,b)=>b.rating-a.rating)[0];goty.innerHTML=`<h2>🏆 Game of the Year</h2><b>${best.title}</b><br>⭐ ${best.rating}/10<br><img src="${best.cover}">`;}

search.addEventListener("input",applyFilters);yearFilter.addEventListener("change",applyFilters);
updateStats();populateYears();renderGames(gameData);createChart();renderGOTY();
</script>

</body>
</html>
